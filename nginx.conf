events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 1. Automatic HTTP to HTTPS Redirect + ACME Challenge
    server {
        listen 80;
        server_name bookolab.com www.bookolab.com 167.172.136.9;

        # FIRST: Handle Certbot verification over HTTP
        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
            try_files $uri =404;
        }

        # SECOND: Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. Secure HTTPS Server block
    server {
        listen 443 ssl;
        server_name bookolab.com www.bookolab.com 167.172.136.9;

        # Paths to your mounted certificates
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # 3. Route Frontend Assets (Served via the frontend container)
        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Intercept errors so we can handle SPA routing gracefully
            proxy_intercept_errors on;

            # If a sub-route 404s, internally redirect to the frontend container's index.html
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://frontend:80/index.html;
            proxy_set_header Host $host;
        }

        # 4. Proxy API Requests to Spring Boot
        location /api/ {
            proxy_pass http://backend:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth {
            proxy_pass http://backend:8080/auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 5. Proxy WebSocket Protocol (STOMP Connections)
        location /gs-guide-websocket {
            proxy_pass http://backend:8080/gs-guide-websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
