# src/test/resources/application-test.properties

# Use a totally separate database name so your dev data is safe!
spring.datasource.url=jdbc:postgresql://localhost:5432/collabbook_test
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Tests can safely create/drop their own schema every run
spring.jpa.hibernate.ddl-auto=create-drop

# Turn off Redis rate limiting during tests if needed
spring.data.redis.host=localhost