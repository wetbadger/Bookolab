spring.application.name=demo

# PostgreSQL Connection Settings
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000

# Force Spring Boot to run data.sql/schema.sql
spring.sql.init.mode=always

# JPA / Hibernate Configurations
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Choose 'update' to let Hibernate create tables, or 'validate' if you manage schemas manually
spring.jpa.hibernate.ddl-auto=update

# Turn statistics on
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=debug

# Show all queries (Uncomment if needed)
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true
# logging.level.org.hibernate.SQL=DEBUG

# Defer datasource initialization so data.sql runs AFTER Hibernate creates tables
spring.jpa.defer-datasource-initialization=true

# Default fallback for local development
# app.cors.allowed-origin=http://localhost:5173
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# Drop db tables on startup
spring.jpa.hibernate.ddl-auto=create-drop

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Define rate limits
ratelimit.global.capacity=50000
ratelimit.ip.capacity=1000
ratelimit.user.capacity=500
ratelimit.websocket.capacity=100
