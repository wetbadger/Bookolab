version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bookolab-postgres
    env_file:
      - .env-production
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bookolab-network

  redis:
    image: redis:alpine
    container_name: bookolab-redis
    networks:
      - bookolab-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bookolab-backend
    depends_on:
      - postgres
      - redis
    env_file:
      - .env-production
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - CORS_ALLOWED_ORIGIN=https://bookolab.com  # CHANGED: Update to your real HTTPS domain
      - JWT_SECRET_KEY=${JWT_SECRET}
    volumes:
      - ./src/main/resources/private.key:/app/private.key
      - ./src/main/resources/public.key:/app/public.key
    ports:
      - "127.0.0.1:8081:8080"
    networks:
      - bookolab-network

  frontend:
    build:
      context: ./src/bookolab
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=https://bookolab.com  # CHANGED: Update to your real HTTPS domain
    container_name: bookolab-frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - bookolab-network

  # nginx:
  #   image: nginx:alpine
  #   container_name: bookolab-nginx
  #   ports:
  #     - "80:80"   # Handles HTTP (and redirects to HTTPS)
  #     - "443:443" # Handles secure HTTPS traffic
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/ssl:ro
  #     - webroot:/usr/share/nginx/html
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - bookolab-network

volumes:
  pgdata:
  webroot:

networks:
  bookolab-network:
    driver: bridge
